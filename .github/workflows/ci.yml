name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run backend unit/integration tests
        run: ./mvnw -B test

  e2e-tests:
    needs: backend-tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: e2e_root_password
          MYSQL_DATABASE: shop_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PASSWORD: e2e_root_password
      JWT_SECRET: ci-e2e-jwt-secret-do-not-use-in-prod-32chars
      COOKIE_SECURE: "false"
      # The e2e suite logs in/registers far more than 10 times/min from one IP — raise the
      # auth rate limit so the suite isn't throttled by a control meant for real traffic.
      RATE_LIMIT_AUTH_MAX: "1000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build app jar
        run: ./mvnw -B -DskipTests package

      - name: Start app
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          echo "Waiting for app to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then
              echo "App is up after ${i}0s"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          cat app.log
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-tests/package-lock.json

      - name: Install frontend-tests dependencies
        working-directory: frontend-tests
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend-tests
        run: npm run test:unit

      - name: Install Playwright browsers
        working-directory: frontend-tests
        run: npx playwright install --with-deps chromium firefox

      - name: Run e2e tests
        working-directory: frontend-tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-tests/playwright-report/
          retention-days: 7

      - name: Dump app logs on failure
        if: failure()
        run: cat app.log
