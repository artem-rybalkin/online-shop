# Test configuration - must override main properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false

# Disable H2 console for tests
spring.h2.console.enabled=false

# Disable SQL init for tests
spring.sql.init.mode=never

# Override any MySQL settings from main properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.application.name=online-shop-test

# JWT secret for tests
jwt.secret=test-secret-key-for-unit-tests-only-32chars

# CORS — allow all in tests
cors.allowed-origins=http://localhost:3000,http://localhost:8080

# Rate limiting — effectively disabled in tests to avoid throttling auth endpoint calls
rate-limit.auth.max-requests=10000
rate-limit.auth.window-seconds=60