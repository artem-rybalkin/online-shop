# Порт сервера
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:shop_db}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# Connection pool settings for better stability
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=never

# Allow Flyway to baseline an existing schema that was created before Flyway was introduced.
# Flyway will stamp the current DB state as V1 and only apply future migrations (V2+).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# DevTools settings for Docker (needed for Windows file sync)
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
spring.devtools.restart.exclude=static/**,public/**,templates/**
spring.devtools.restart.additional-paths=target/classes

spring.application.name=online-shop

# JWT secret — must be set via JWT_SECRET env var (no fallback)
jwt.secret=${JWT_SECRET}

# Set to true once the app is served over HTTPS, so the auth cookie gets the Secure flag.
app.cookie.secure=${COOKIE_SECURE:false}

# CORS — comma-separated list of allowed origins; override via CORS_ALLOWED_ORIGINS env var
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:8081}

# Actuator — expose prometheus scrape endpoint for Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true

# Distributed tracing — send spans to Tempo via OTLP HTTP
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
management.tracing.sampling.probability=1.0

# Rate limiting for /api/auth/** endpoints (per client IP, fixed window)
rate-limit.auth.max-requests=${RATE_LIMIT_AUTH_MAX:10}
rate-limit.auth.window-seconds=${RATE_LIMIT_AUTH_WINDOW:60}